name: Backtest

on:
  workflow_dispatch:
    inputs:
      days:
        description: "How many days of history to test"
        type: number
        default: 365
      variant:
        description: "Which strategy version to test"
        type: choice
        options: [compare, baseline, candidate, trend_only, ride, ride_be, target_2r, target_3r]
        default: compare

permissions:
  contents: read

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run backtest and email the report
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m bot.backtest --days "${{ inputs.days }}" --variant "${{ inputs.variant }}" --email
