name: ML Research

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: "Symbol to test"
        default: BTCUSDT
      days:
        description: "Days of daily history"
        type: number
        default: 1500

permissions:
  contents: read

jobs:
  ml:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ML dependencies
        run: pip install --quiet numpy scikit-learn
      - name: Run leakage-free ML research
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m bot.ml_research --symbol "${{ inputs.symbol }}" --days "${{ inputs.days }}" --email
